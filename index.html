<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hacker's Helpdesk</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #050507;
      --color-card: #101010;
      --color-text-main: #f2f2f2;
      --color-text-body: #b8b3b0;
      --color-accent: #00d992;
      --color-border: #3d3a39;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text-main);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    .container {
      max-width: 800px;
      width: 100%;
    }
    pre {
      font-family: 'JetBrains Mono', monospace;
      background: var(--color-card);
      border: 1px solid var(--color-border);
      padding: 1.5rem;
      border-radius: 8px;
      color: var(--color-accent);
      overflow-x: auto;
    }
    .hero {
      text-align: center;
      padding: 4rem 0;
    }
    h1 {
      font-size: 3.75rem;
      letter-spacing: -0.65px;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .accent { color: var(--color-accent); }
    .card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      padding: 2rem;
      border-radius: 8px;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>Hacker's <span class="accent">Helpdesk</span></h1>
      <p>Terminal-first solutions for the modern age.</p>
    </div>
    
    <div class="card">
      <h3>System Status</h3>
      <pre>
> initializing_helpdesk...
> security_protocols_active.
> ready_for_input.
      </pre>
      <p style="color: var(--color-text-body);">We help you build, break, and fix. What are we working on today?</p>
    </div>
  </div>
</body>
</html>
